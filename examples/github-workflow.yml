name: EPIC Upgrade Guard CI

on:
  pull_request:
    paths:
      - 'programs/**'
      - 'Cargo.toml'

jobs:
  epic-check:
    name: Verify ABI Stability
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Current Commit
        uses: actions/checkout@v4
        with:
          path: src-new

      - name: Checkout Previous Commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: src-old

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run EPIC Upgrade Intelligence
        uses: solana-epic/epic@v0.2.0-beta.0
        with:
          old_path: src-old
          new_path: src-new
          format: sarif

      - name: Upload Security Findings
        uses: github/code-scanning-upload-aurora@v2
        with:
          sarif_file: epic-report.sarif
